name: "Nitro Client Publish"
description: "Publishes client operations to the Nitro registry"
author: "ChilliCream"
branding:
  icon: "send"
  color: "orange"

inputs:
  tag:
    description: "The tag of the client version"
    required: true
  stage:
    description: "The name of the stage"
    required: true
  client-id:
    description: "The ID of the client"
    required: true
  api-key:
    description: "API key for authentication"
    required: true
    secret: true
  force:
    description: "Continue publishing even if breaking changes or validation errors are detected."
    required: false
    default: "false"
  wait-for-approval:
    description: "Require approval in the Nitro UI to continue publishing when breaking changes or validation errors are detected."
    required: false
    default: "false"
  cloud-url:
    description: "The URL of the Nitro registry"
    required: false
  job-id:
    description: "The ID of the current job"
    required: false
    default: ${{ job.check_run_id }}

runs:
  using: "node20"
  main: "dist/index.js"
